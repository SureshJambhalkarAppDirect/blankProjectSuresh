<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Uploader Prototype - Start Here</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: white;
            border-radius: 12px;
            padding: 48px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }

        p {
            font-size: 16px;
            color: #666;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .prototype-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .prototype-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .prototype-button.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .prototype-button.secondary:hover {
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.4);
        }

        .info {
            margin-top: 32px;
            padding: 16px;
            background-color: #f8f9fa;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
            text-align: left;
        }

        .info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Product Uploader Prototype</h1>
        <p>Choose which experience you'd like to start with:</p>
        
        <div class="button-group">
            <a href="Product-Uploader-Existing-With-Try-New.html" class="prototype-button">
                📄 Start with Existing Page
            </a>
            <a href="Product-Uploader-New-With-Switch-Back.html" class="prototype-button secondary">
                ⭐ Start with New Experience
            </a>
        </div>

        <div class="info">
            <strong>💡 Tip:</strong> Click the banner buttons to switch between views!
            <br><br>
            <strong>📍 Starting Point:</strong> Use "Start with Existing Page" to see the full flow from existing → new experience.
        </div>
    </div>
</body>
</html>
